name: Deploy to CorpCore

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            DEPLOY_DIR="/home/admen/corpcore/letter-builder"

            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              git clone https://github.com/V1aj3ro/letter-builder.git "$DEPLOY_DIR"
            fi

            cd "$DEPLOY_DIR"
            git fetch origin main
            PREV=$(git rev-parse HEAD)
            git reset --hard origin/main

            if [ ! -f ".env" ]; then
              printf 'DB_PASSWORD=%s\nSECRET_KEY=%s\n' \
                '${{ secrets.DB_PASSWORD }}' \
                '${{ secrets.SECRET_KEY }}' > .env
            fi

            # Determine which services changed
            CHANGED=$(git diff --name-only $PREV HEAD)
            BUILD=""
            if echo "$CHANGED" | grep -q "^backend/"; then
              BUILD="$BUILD letters-backend"
            fi
            if echo "$CHANGED" | grep -q "^frontend/"; then
              BUILD="$BUILD letters-frontend"
            fi
            if echo "$CHANGED" | grep -q "^docker-compose.yml"; then
              BUILD="letters-backend letters-frontend"
            fi

            if [ -n "$BUILD" ]; then
              docker compose build $BUILD
            fi

            docker compose up -d --remove-orphans
            sleep 3
            docker compose ps
