name: Deploy to CorpCore

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: changes
        run: |
          PREV=$(git rev-parse HEAD^1)
          CHANGED=$(git diff --name-only "$PREV" HEAD)
          BUILD=""
          echo "$CHANGED" | grep -q "^backend/"       && BUILD="$BUILD letters-backend"
          echo "$CHANGED" | grep -q "^frontend/"      && BUILD="$BUILD letters-frontend"
          echo "$CHANGED" | grep -q "^docker-compose" && BUILD="letters-backend letters-frontend"
          echo "services=${BUILD}" >> "$GITHUB_OUTPUT"

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync files to server
        run: |
          DEPLOY_DIR="/home/${{ secrets.SSH_USER }}/corpcore/letter-builder"
          rsync -az --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.env' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${DEPLOY_DIR}/"

      - name: Build and restart containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            DEPLOY_DIR="/home/${{ secrets.SSH_USER }}/corpcore/letter-builder"
            cd "$DEPLOY_DIR"

            if [ ! -f ".env" ]; then
              printf 'DB_PASSWORD=%s\nSECRET_KEY=%s\nAPP_PUBLIC_URL=%s\nONLYOFFICE_SERVER=%s\nONLYOFFICE_JWT_SECRET=%s\n' \
                '${{ secrets.DB_PASSWORD }}' \
                '${{ secrets.SECRET_KEY }}' \
                '${{ secrets.APP_PUBLIC_URL }}' \
                '${{ secrets.ONLYOFFICE_SERVER }}' \
                '${{ secrets.ONLYOFFICE_JWT_SECRET }}' > .env
            fi

            # Always sync ONLYOFFICE_INTERNAL_URL from secret (needed for hairpin NAT bypass)
            if [ -n '${{ secrets.ONLYOFFICE_INTERNAL_URL }}' ]; then
              sed -i '/^ONLYOFFICE_INTERNAL_URL=/d' .env
              echo 'ONLYOFFICE_INTERNAL_URL=${{ secrets.ONLYOFFICE_INTERNAL_URL }}' >> .env
            fi

            BUILD="${{ steps.changes.outputs.services }}"
            if [ -n "$BUILD" ]; then
              docker compose build $BUILD
              docker compose rm -sf $BUILD 2>/dev/null || true
            fi

            docker compose up -d --remove-orphans
            sleep 3
            docker compose ps
