services:
  letters-db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: letters
      POSTGRES_USER: letters
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - letters_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U letters -d letters"]
      interval: 5s
      timeout: 5s
      retries: 10

  letters-backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://letters:${DB_PASSWORD}@letters-db:5432/letters
      SECRET_KEY: ${SECRET_KEY}
      UPLOAD_DIR: /app/uploads
      # OnlyOffice Document Server URL (public, reachable from browser)
      ONLYOFFICE_SERVER: ${ONLYOFFICE_SERVER:-https://office.demo.corpcore.ru}
      # Public URL of THIS app reachable by the OnlyOffice server
      # Example: https://letters.demo.corpcore.ru  or  http://YOUR_IP:3010
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-}
      # JWT secret configured in OnlyOffice (leave empty if JWT is disabled)
      ONLYOFFICE_JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-}
      # Internal URL for OnlyOffice (HTTP) to bypass hairpin NAT.
      # Set to e.g. http://172.18.0.9 when HTTPS is unavailable from inside Docker.
      ONLYOFFICE_INTERNAL_URL: ${ONLYOFFICE_INTERNAL_URL:-}
    volumes:
      - letters_uploads:/app/uploads
    depends_on:
      letters-db:
        condition: service_healthy
    networks:
      - default
      - proxy

  letters-frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3010:80"
    depends_on:
      - letters-backend

volumes:
  letters_db_data:
  letters_uploads:

networks:
  default:
  proxy:
    external: true
